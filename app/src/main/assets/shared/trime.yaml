# Xiboard default style settings
# encoding: utf-8

config_version: "3.0"
name: 默认 #方案名称
author: osfans #作者信息

style:
  auto_caps: false #自动句首大写:true|false
  candidate_font: han.ttf #候选字体
  candidate_padding: 5 #候选项内边距
  candidate_spacing: 0.0 #候选分割线
  candidate_text_size: 22 #候选字号
  candidate_text_vertical_bias: 1.0 #候选文本垂直偏移位置（仅 overlay 模式使用，需要间隙空间足够，范围 0.0~1.0，0.0=top，0.5=center，1.0=bottom）
  candidate_view_height: 26 #候选区高度
  #candidate_corner_radius: 4 #候选項圆角半径
  comment_font: comment.ttf #编码提示字体
  comment_height: 10 #编码提示区高度（仅 top 模式约束高度，其余模式与 candidate_view_height 无区别）
  comment_position: right #编码提示布局位置：right / top / overlay
  comment_vertical_bias: 0.0 #编码提示垂直偏移位置（仅 overlay 模式使用，需要间隙空间足够，范围 0.0~1.0，0.0=top，0.5=center，1.0=bottom）
  comment_text_size: 10 #编码提示字号
  hanb_font: hanb.ttf #扩充字体
  horizontal_gap: 1 #键水平間距
  keyboard_padding: 0 #竖屏模式下，屏幕左右两侧与键盘的距离（曲面屏减少误触）
  keyboard_padding_left: 0 #竖屏屏模式下，左手键盘布局，屏幕左侧与键盘的距离
  keyboard_padding_right: 40 #竖屏屏模式下，左手键盘布局，屏幕右侧与键盘的距离
  keyboard_padding_bottom: 0 #竖屏模式下，屏幕下边缘与键盘的距离（避免误触发全面屏手势）
  keyboard_padding_land: 40 #横屏模式下，屏幕左右两侧与键盘的距离（避免横屏按键过度拉伸变形）
  keyboard_padding_land_bottom: 0 #横屏模式下，屏幕下侧与键盘的距离
  key_font: symbol.ttf #键盘字体
  key_height: 42 #键高
  key_long_text_size: 14 #长标签字号
  key_text_size: 22 #键字号
  key_width: 10.0 #键宽，占屏幕宽的百分比
  label_text_size: 22 #标签字号
  label_font: label.ttf #编标签字体
  latin_font: latin.ttf #西文字体
  keyboard_height: 216 #锁定键盘高度，避免切换时键盘高度变化而造成闪烁
  keyboard_height_land: 184 #锁定横屏下键盘高度，避免切换时键盘高度变化而造成闪烁
  preview_font: latin.ttf #按键提示字体
  preview_height: 60 #按键提示高度
  preview_offset: -12 #按键提示纵向偏移
  preview_text_size: 40 #按键提示字号
  reset_ascii_mode_on_focus_change: false #焦点变更弹起输入法软键盘时，重置 ascii_mode
  round_corner: 8 #按键圆角半径
  shadow_radius: 0.0 #按键阴影半径
  symbol_font: symbol.ttf #符号字体
  symbol_text_size: 10 #符号字号
  text_font: latin.ttf #编码字体
  vertical_gap: 6 #键盘行距
  #background_folder: #背景图保存在background目录下的哪个子目录
  enter_label_mode: 0  #是否使用App提供的ActionLabel内容作为Enter键的文本（由于多数App没有适配ActionLable，实际影响不大）。0不使用，1只使用actionlabel，2优先使用，3当其他方式没有获得label时才读取actionlabel
  enter_labels:  # 定义Enter键的文本
    go: 前往
    done: 完成
    next: 下个
    pre:  上个
    search: 搜索
    send: 发送
    default: Enter   # 定义默认Enter键的文本

preedit:                  # 预编辑文本视图参数
  horizontal_padding: 8     # 横向内边距（整数）
#  alpha: 0.8                 # 透明度（0-1，浮点）
  top_end_radius: 4         # 末上端圆角（浮点）
  foreground:               # 前景样式
    font_size: 16             # 预编辑字体大小（浮点）

window:               # 候选窗口（悬浮窗）参数
  insets:               # 窗口内边距
    vertical: 4           # 纵向内边距（整数）
    horizontal: 4         # 横向内边距（整数）
  item_padding:         # 候选项内边距
#    vertical: 0           # 纵向内边距（整数）
    horizontal: 4         # 横向内边距（整数）
#  min_width: 0          # 最小宽度（整数）
#  corner_radius: 0      # 圆角半径（浮点）
#  border: 0             # 边框宽度（整数）
#  shadow: 0.0           # 阴影半径（浮点）
#  alpha: 1              # 透明度（0-1，浮点）
  foreground:           # 前景样式
    label_font_size: 20   # 序号字体大小（浮点）
    text_font_size: 20    # 文字字体大小（浮点）
    comment_font_size: 16  # 注释字体大小（浮点）

# 最好保留一项，防止其他主题使用 __include 时无法加载
fallback_colors:
  candidate_text_color: text_color
# 以下值是程序内置的，你也可以在这里自定义，这会覆盖默认值
